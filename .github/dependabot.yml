version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:05"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    groups:
      docker:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:15"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: tensorflow
        update-types:
          - version-update:semver-major
      - dependency-name: keras
        update-types:
          - version-update:semver-major
      - dependency-name: numpy
        update-types:
          - version-update:semver-major

  - package-ecosystem: pub
    directory: /mobile
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    groups:
      flutter-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
